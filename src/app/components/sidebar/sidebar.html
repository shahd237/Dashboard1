<aside class="sidebar">
  <div class="sidebar__brand">
    <span class="sidebar__brand-text">{{ brandName }}</span>
  </div>

  <nav class="sidebar__nav">
    <ul>
      <li *ngFor="let item of navItems" routerLinkActive="is-active">
        <a [routerLink]="item.route">
          <span class="sidebar__icon">
            <ng-container [ngSwitch]="item.icon">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
              >
                <path
                  d="M3 10.5L12 3L21 10.5"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path
                  d="M5 9.5V20H19V9.5"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path
                  d="M9 20V14H15V20"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </ng-container>
          </span>
          <span class="sidebar__label">{{ item.label }}</span>
        </a>
      </li>
    </ul>

    <a class="sidebar__logout" routerLink="/logout">
      <span>تسجيل الخروج</span>
      <svg viewBox="0 0 24 24" fill="none">
        <path
          d="M15 16.5 19.5 12 15 7.5"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
        <path d="M19.5 12H9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
        <path
          d="M11.5 4.5H6A1.5 1.5 0 0 0 4.5 6v12A1.5 1.5 0 0 0 6 19.5h5.5"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </svg>
    </a>
  </nav>
</aside>
