<aside class="sidebar">
  <div class="sidebar__brand">
    <span class="sidebar__brand-text">{{ brandName }}</span>
  </div>

  <nav class="sidebar__nav">
    <ul>
      <li *ngFor="let item of navItems" routerLinkActive="is-active">
        <a [routerLink]="item.route">
          <span class="sidebar__label">{{ item.label }}</span>

          <span class="sidebar__icon">
            <ng-container [ngSwitch]="item.icon">
              <svg *ngSwitchCase="'grid'" viewBox="0 0 24 24" fill="none">
                <rect x="3" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.8"/>
                <rect x="14" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.8"/>
                <rect x="3" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.8"/>
                <rect x="14" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.8"/>
              </svg>
              <svg *ngSwitchCase="'tool'" viewBox="0 0 24 24" fill="none">
                <path d="M14.7 6.3a4 4 0 1 0-5.4 5.4L4 17l3 3 5.3-5.3a4 4 0 0 0 5.4-5.4l-2.4 2.4-2-2 2.4-2.4Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
              </svg>
              <svg *ngSwitchCase="'users'" viewBox="0 0 24 24" fill="none">
                <circle cx="9" cy="8" r="3" stroke="currentColor" stroke-width="1.6"/>
                <path d="M3.5 19c0-2.8 2.5-5 5.5-5s5.5 2.2 5.5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                <circle cx="17" cy="8" r="2.4" stroke="currentColor" stroke-width="1.4"/>
                <path d="M15.5 14.2c2.4.2 4.5 2.1 4.5 4.8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
              </svg>
              <svg *ngSwitchCase="'inbox'" viewBox="0 0 24 24" fill="none">
                <path d="M3 12.5 5.5 5h13l2.5 7.5" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
                <path d="M3 12.5h5.2l1.3 2.3h5l1.3-2.3H21V18a1.5 1.5 0 0 1-1.5 1.5h-15A1.5 1.5 0 0 1 3 18v-5.5Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
              </svg>
              <svg *ngSwitchCase="'contacts'" viewBox="0 0 24 24" fill="none">
                <rect x="4" y="3.5" width="16" height="17" rx="2" stroke="currentColor" stroke-width="1.6"/>
                <circle cx="12" cy="10" r="2.2" stroke="currentColor" stroke-width="1.5"/>
                <path d="M8.2 16.3c.6-1.6 2-2.5 3.8-2.5s3.2.9 3.8 2.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
              <svg *ngSwitchCase="'badge'" viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="8.5" r="4" stroke="currentColor" stroke-width="1.6"/>
                <path d="M9 12 7.5 20.5 12 18l4.5 2.5L15 12" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
              </svg>
              <svg *ngSwitchCase="'gift'" viewBox="0 0 24 24" fill="none">
                <rect x="3.5" y="9" width="17" height="11" rx="1.2" stroke="currentColor" stroke-width="1.6"/>
                <path d="M3.5 12.5h17" stroke="currentColor" stroke-width="1.6"/>
                <path d="M12 9v11" stroke="currentColor" stroke-width="1.6"/>
                <path d="M12 9C9.5 9 8 7.7 8 6.2A2.2 2.2 0 0 1 10.2 4C11.7 4 12 6.5 12 9Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                <path d="M12 9c2.5 0 4-1.3 4-2.8A2.2 2.2 0 0 0 13.8 4C12.3 4 12 6.5 12 9Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
              </svg>
              <svg *ngSwitchCase="'chart'" viewBox="0 0 24 24" fill="none">
                <path d="M4 19.5V9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                <path d="M10 19.5V4.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                <path d="M16 19.5V12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                <path d="M3 19.5h18" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
              </svg>
              <svg *ngSwitchCase="'settings'" viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.6"/>
                <path d="M12 3.5v2M12 18.5v2M4.5 12h-2M21.5 12h-2M6.3 6.3 4.9 4.9M19.1 19.1l-1.4-1.4M6.3 17.7 4.9 19.1M19.1 4.9l-1.4 1.4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
              <svg *ngSwitchCase="'phone'" viewBox="0 0 24 24" fill="none">
                <rect x="7" y="2" width="10" height="20" rx="2" stroke="currentColor" stroke-width="1.6"/>
                <circle cx="12" cy="18" r="1" fill="currentColor"/>
              </svg>
              <svg *ngSwitchCase="'megaphone'" viewBox="0 0 24 24" fill="none">
                <path d="M3 10.5h2.5l7-5v13l-7-5H3a1 1 0 0 1-1-1v-2a1 1 0 0 1 1-1Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
                <path d="M8.5 15.5v4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                <path d="M17.5 8.5a4 4 0 0 1 0 7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
              </svg>
              <svg *ngSwitchCase="'bell'" viewBox="0 0 24 24" fill="none">
                <path d="M18 9.5a6 6 0 1 0-12 0c0 3.2-1 5-2 6.5h16c-1-1.5-2-3.3-2-6.5Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
                <path d="M9.5 19a2.5 2.5 0 0 0 5 0" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
              </svg>
              <svg *ngSwitchCase="'review'" viewBox="0 0 24 24" fill="none">
                <rect x="3" y="3" width="18" height="18" rx="3" stroke="currentColor" stroke-width="1.6"/>
                <path d="M7 9h10M7 13h6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
              </svg>
              <svg *ngSwitchCase="'report'" viewBox="0 0 24 24" fill="none">
                <path d="M4 19.5V9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                <path d="M10 19.5V4.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                <path d="M16 19.5V12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                <path d="M3 19.5h18" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
              </svg>
            </ng-container>
          </span>
        </a>
      </li>
    </ul>

    <a class="sidebar__logout" routerLink="/logout">
      <span>تسجيل الخروج</span>
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M15 16.5 19.5 12 15 7.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M19.5 12H9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M11.5 4.5H6A1.5 1.5 0 0 0 4.5 6v12A1.5 1.5 0 0 0 6 19.5h5.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
  </nav>
</aside>
