<header class="topbar">
  <div class="topbar__right">
    <div class="topbar__hamburger">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
    <span class="topbar__title">{{ pageTitle }}</span>
  </div>

  <div class="topbar__left">
  
    <button
      class="topbar__icon-btn topbar__notification-btn"
      type="button"
      aria-label="إشعارات"
      (click)="toggleNotifications()"
    >
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M18 9.5a6 6 0 1 0-12 0c0 3.2-1 5-2 6.5h16c-1-1.5-2-3.3-2-6.5Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
        <path d="M9.5 19a2.5 2.5 0 0 0 5 0" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
      <span class="topbar__notification-dot" *ngIf="notifications.length"></span>
    </button>

      <button class="topbar__icon-btn" type="button" aria-label="اللغة">
      <svg viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.6"/>
        <path d="M12 3c-2.5 3-4 5.7-4 9s1.5 6 4 9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        <path d="M12 3c2.5 3 4 5.7 4 9s-1.5 6-4 9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        <path d="M3 12h18" stroke="currentColor" stroke-width="1.4"/>
      </svg>
    </button>


    <div class="topbar__profile">
      <div class="topbar__user-meta">
        <span class="topbar__user-name">{{ userName }}</span>
        <span class="topbar__user-role">مدير النظام</span>
      </div>
      <div class="topbar__avatar">{{ userName.charAt(0) }}</div>
    </div>
  </div>
</header>

<div
  class="notifications-backdrop"
  *ngIf="isNotificationsOpen"
  (click)="closeNotifications()"
></div>

<section
  class="notifications-modal"
  *ngIf="isNotificationsOpen"
  dir="rtl"
>
  <div class="notifications-modal__header">
    <h3>الإشعارات</h3>
    <button type="button" (click)="viewAllNotifications()">عرض الكل</button>
  </div>

  <div class="notifications-modal__list">
    <button
      class="notification-item"
      type="button"
      *ngFor="let item of notifications"
    >
      <span class="notification-item__icon">
        <svg viewBox="0 0 24 24" fill="none">
          <path [attr.d]="item.iconPath" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>

      <span class="notification-item__content">
        <strong>{{ item.title }}</strong>
        <span>{{ item.message }}</span>
        <small>{{ item.time }}</small>
      </span>
    </button>
  </div>

  <button
    class="notifications-modal__footer"
    type="button"
    (click)="viewAllNotifications()"
  >
    عرض كل الإشعارات
  </button>
</section>
