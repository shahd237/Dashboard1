<div class="auth-page">
  <div class="dots-tr"></div>

  <div class="auth-card">
    <!-- Left: Logo -->
    <div class="auth-card__left">
      <div class="auth-logo">
        <img src="assets/image/5b09c949c0e5dc85dbea132b68f8bf8e1c6a7b23.png" alt="" width="350" height="350">
      </div> 
    </div>
    

    <!-- Right: Form -->
    <div class="auth-card__right">
      <h2 class="auth-title" style="text-align: center; color: #0A437B;">مرحباً مجدداً </h2>
      <p class="auth-subtitle" style="text-align: center;">سجل الدخول للوصول الي لوحة التحكم</p>

      <div class="auth-error" *ngIf="error">{{ error }}</div>

      <div class="auth-form">
        <div class="auth-field">
          <label style="color: #0A437B;">البريد الإلكتروني</label>
          <div class="auth-input-wrap">
            <input type="email" [(ngModel)]="email" placeholder="أدخل بريدك الإلكتروني" (keydown.enter)="submit()" />
            <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="5.5" width="18" height="13" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M3 8l9 5.5L21 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </div>
        </div>

        <div class="auth-field">
          <label style="color: #0A437B;">كلمة المرور</label>
          <div class="auth-input-wrap">
            <input [type]="showPass ? 'text' : 'password'" [(ngModel)]="password" placeholder="أدخل كلمة المرور" (keydown.enter)="submit()" />
            <button type="button" (click)="showPass = !showPass">
              <svg viewBox="0 0 24 24" fill="none" width="16" height="16">
                <path *ngIf="!showPass" d="M2.5 12S6 5.5 12 5.5 21.5 12 21.5 12 18 18.5 12 18.5 2.5 12 2.5 12Z" stroke="currentColor" stroke-width="1.5"/><circle *ngIf="!showPass" cx="12" cy="12" r="2.5" stroke="currentColor" stroke-width="1.5"/>
                <path *ngIf="showPass" d="M3 3l18 18M10.5 10.7A2.5 2.5 0 0 0 13.3 13.5M6.5 6.7C4.5 8 3 10 3 12s3.5 6.5 9 6.5c1.8 0 3.4-.4 4.7-1.1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </button>
          </div>
        </div>

        <a routerLink="/forgot-password" class="auth-forgot">هل نسيت كلمة المرور؟</a>

        <button class="auth-btn" type="button" (click)="submit()" [disabled]="loading" [routerLink]="['/dashboard']">
          <svg viewBox="0 0 24 24" fill="none" width="16" height="16"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          {{ loading ? 'جارِ التحقق...' : 'تسجيل الدخول' }}
        </button>

      </div>
    </div>
  </div>
</div>
