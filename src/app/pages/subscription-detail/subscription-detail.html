<div class="detail-page" *ngIf="row">

  <div class="detail-grid">
    <!-- LEFT: Receipt Image -->
    <div class="receipt-card">
      <div class="receipt-card__header">
        <h3>صورة الوصل</h3>
        <button class="back-btn" type="button" (click)="goBack()">
          <svg viewBox="0 0 24 24" fill="none" width="14" height="14"><path d="M15 6l-6 6 6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          رجوع
        </button>
      </div>

      <div class="receipt-image-wrap">
        <svg viewBox="0 0 320 420" xmlns="http://www.w3.org/2000/svg" class="receipt-svg">
          <!-- Paper background -->
          <rect width="320" height="420" fill="#f5f0eb" rx="4"/>
          <rect x="16" y="12" width="288" height="396" fill="#ffffff" rx="3"/>

          <!-- Fawry logo area -->
          <rect x="16" y="12" width="288" height="80" fill="#fff" rx="3 3 0 0"/>
          <text x="170" y="55" text-anchor="middle" font-size="22" font-weight="800" fill="#222" font-family="Arial">fawry</text>
          <text x="110" y="55" text-anchor="middle" font-size="19" font-weight="800" fill="#f90" font-family="Arial">فوري ⓘ</text>
          <line x1="26" y1="78" x2="294" y2="78" stroke="#e0e0e0" stroke-width="1.2"/>

          <!-- Receipt lines -->
          <text x="160" y="108" text-anchor="middle" font-size="10.5" fill="#555">كود الخدمة: 123456 - اشتراك شهري</text>
          <text x="160" y="124" text-anchor="middle" font-size="10" fill="#888">رقم المرجع: {{ row.txnId }}</text>
          <text x="160" y="140" text-anchor="middle" font-size="10" fill="#888">التاريخ: {{ row.date }} الساعة {{ row.time }}</text>

          <line x1="26" y1="152" x2="294" y2="152" stroke="#eee" stroke-width="1" stroke-dasharray="5 3"/>

          <text x="40" y="174" font-size="11" fill="#444">قيمة الاشتراك</text>
          <text x="280" y="174" text-anchor="end" font-size="11" fill="#444">EGP 2987.00</text>
          <text x="40" y="193" font-size="11" fill="#444">ضريبة القيمة المضافة</text>
          <text x="280" y="193" text-anchor="end" font-size="11" fill="#444">EGP 13.00</text>

          <line x1="26" y1="206" x2="294" y2="206" stroke="#ddd" stroke-width="1"/>

          <text x="40" y="228" font-size="14" font-weight="bold" fill="#222">EGP 3000.00</text>
          <text x="280" y="228" text-anchor="end" font-size="13" fill="#666">الإجمالي</text>

          <line x1="26" y1="242" x2="294" y2="242" stroke="#ddd" stroke-width="1"/>

          <text x="160" y="268" text-anchor="middle" font-size="19" font-weight="800" fill="#222">3836656611</text>
          <text x="160" y="288" text-anchor="middle" font-size="11" fill="#888">رقم الفاتورة</text>

          <line x1="26" y1="300" x2="294" y2="300" stroke="#eee" stroke-width="1" stroke-dasharray="5 3"/>

          <text x="160" y="325" text-anchor="middle" font-size="10" fill="#999">هذه الفاتورة إيصال دفع رسمي</text>
          <text x="160" y="342" text-anchor="middle" font-size="10" fill="#999">يُعتمد به لدى الجهات المختصة</text>

          <line x1="26" y1="356" x2="294" y2="356" stroke="#eee" stroke-width="1" stroke-dasharray="5 3"/>

          <text x="160" y="378" text-anchor="middle" font-size="10" fill="#bbb">www.fawry.com</text>
          <text x="160" y="394" text-anchor="middle" font-size="9.5" fill="#bbb">شكراً لاختيارك فوري</text>
        </svg>
      </div>

      <button class="btn-approve" type="button" (click)="approve()" [disabled]="approved">
        <svg viewBox="0 0 24 24" fill="none" width="16" height="16"><path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        {{ approved ? 'تم القبول ✓' : 'قبول الاشتراك' }}
      </button>
    </div>

    <!-- RIGHT: Subscription Data -->
    <div class="data-card">
      <h3 class="data-card__title">بيانات طلب الاشتراك</h3>

      <ul class="data-list">
        <li>
          <span class="data-list__key">رقم العملية</span>
          <span class="data-list__val">{{ row.txnId }}</span>
        </li>
        <li>
          <span class="data-list__key">اسم المستخدم</span>
          <span class="data-list__val">{{ row.userName }}</span>
        </li>
        <li>
          <span class="data-list__key">رقم الهاتف</span>
          <span class="data-list__val dir-ltr">{{ row.phone }}</span>
        </li>
        <li>
          <span class="data-list__key">تاريخ الطلب</span>
          <span class="data-list__val">{{ row.date }} ص {{ row.time }}</span>
        </li>
        <li>
          <span class="data-list__key">المبلغ</span>
          <span class="data-list__val">{{ row.amount }}</span>
        </li>
        <li>
          <span class="data-list__key">طريقة الدفع</span>
          <span class="data-list__val">{{ row.paymentMethod }}</span>
        </li>
        <li>
          <span class="data-list__key">الحالة الحالية</span>
          <span class="data-list__val status-val"
            [class.green]="row.status === 'مقبول'"
            [class.blue]="row.status === 'بانتظار المراجعة'"
            [class.red]="row.status === 'مرفوض'">
            {{ row.status }}
          </span>
        </li>
      </ul>
    </div>
  </div>

</div>
