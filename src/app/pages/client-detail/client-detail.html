<div class="page-grid">
  <div class="detail-left">
    <div class="page-card detail-stats">
      <h3>إحصائيات العميل</h3>
      <div class="detail-stats__row">
        <div class="detail-stat" *ngFor="let s of stats">
          <span class="detail-stat__value">{{ s.value }}</span>
          <span class="detail-stat__label">{{ s.label }}</span>
        </div>
      </div>
    </div>
    <div class="page-card" style="margin-top:16px">
      <h3 class="card-title">آخر طلبات الصيانة</h3>
      <app-data-table [columns]="columns" [rows]="rows" [actions]="['view']"></app-data-table>
    </div>
  </div>

  <div class="detail-right">
    <div class="page-card profile-card">
      <div class="profile-card__avatar">
        <img [src]="client.avatar" [alt]="client.name" />
      </div>
      <h2 class="profile-card__name">{{ client.name }}</h2>
      <ul class="profile-card__info">
        <li>
          <svg viewBox="0 0 24 24" fill="none"><path d="M6.6 10.8a15.4 15.4 0 0 0 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1A17 17 0 0 1 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
          <span>{{ client.phone }}</span>
        </li>
        <li>
          <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="5.5" width="18" height="13" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M3 8l9 5.5L21 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          <span>{{ client.email }}</span>
        </li>
        <li>
          <svg viewBox="0 0 24 24" fill="none"><path d="M12 13.5a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" stroke="currentColor" stroke-width="1.5"/><path d="M12 2C8.1 2 5 5.1 5 9c0 5.3 7 13 7 13s7-7.7 7-13c0-3.9-3.1-7-7-7Z" stroke="currentColor" stroke-width="1.5"/></svg>
          <span>{{ client.city }}</span>
        </li>
        <li>
          <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="17" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M3 9h18M8 2v4M16 2v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          <span>انضم {{ client.joinDate }}</span>
        </li>
      </ul>
      <a routerLink="/clients" class="back-btn">← العودة للعملاء</a>
    </div>
  </div>
</div>
