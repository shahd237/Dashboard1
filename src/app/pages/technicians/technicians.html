<div class="page-card">
  <!-- Toolbar -->
  <div class="toolbar">
    <button class="btn-add" type="button" (click)="openAdd()">
      <svg viewBox="0 0 24 24" fill="none" width="15" height="15"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      إضافة فني
    </button>
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" width="15" height="15"><circle cx="11" cy="11" r="6.5" stroke="currentColor" stroke-width="1.8"/><path d="M20 20l-4.3-4.3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      <input type="text" [(ngModel)]="search" placeholder="البحث باسم الفني أو الهاتف..." />
    </div>
  </div>

  <!-- Table -->
  <div class="tech-table">
    <table>
      <thead><tr>
        <th>الاسم</th><th>رقم الهاتف</th><th>التخصص</th>
        <th>الطلبات</th><th>التقييم</th><th>تاريخ الانضمام</th>
        <th>الحالة</th><th>إجراءات</th>
      </tr></thead>
      <tbody>
        <tr *ngFor="let t of filtered">
          <td class="tech-name">
            <div class="avatar-circle">{{ t.name.charAt(0) }}</div>{{ t.name }}
          </td>
          <td>{{ t.phone }}</td><td>{{ t.specialty }}</td><td>{{ t.orders }}</td>
          <td><span class="rating"><svg viewBox="0 0 14 14" fill="#f0b429" width="13" height="13"><path d="M7 1l1.6 3.3 3.6.5-2.6 2.5.6 3.6L7 9.3l-3.2 1.6.6-3.6L1.8 4.8l3.6-.5L7 1Z"/></svg>{{ t.rating }}</span></td>
          <td>{{ t.joined }}</td>
          <td>
            <button class="toggle-btn" [class.is-on]="t.active" (click)="toggleActive(t)"><span class="toggle-knob"></span></button>
          </td>
          <td class="actions">
            <button class="action-btn" (click)="openEdit(t)"><svg viewBox="0 0 24 24" fill="none" width="13" height="13"><path d="M16.5 4.5l3 3L8 19l-4 1 1-4 11.5-11.5Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg></button>
            <button class="action-btn is-delete" (click)="confirmDelete(t.id)"><svg viewBox="0 0 24 24" fill="none" width="13" height="13"><path d="M5 7h14M9 7V5h6v2m-8 0 1 12h6l1-12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
          </td>
        </tr>
        <tr *ngIf="filtered.length === 0"><td colspan="8" class="empty-row">لا توجد نتائج مطابقة للبحث</td></tr>
      </tbody>
    </table>
  </div>
  <app-pagination [totalPages]="4"></app-pagination>
</div>

<!-- Add/Edit Modal -->
<app-modal [title]="modalTitle" [visible]="showModal" (closed)="showModal=false">
  <div class="modal-form">
    <div class="mf-row">
      <div class="mf-group"><label>الاسم الكامل</label><input [(ngModel)]="form.name" placeholder="اسم الفني" /></div>
      <div class="mf-group"><label>رقم الهاتف</label><input [(ngModel)]="form.phone" placeholder="05XXXXXXXX" /></div>
    </div>
    <div class="mf-group"><label>التخصص</label>
      <select [(ngModel)]="form.specialty">
        <option *ngFor="let s of specialties">{{ s }}</option>
      </select>
    </div>
    <div class="mf-row">
      <div class="mf-group"><label>تاريخ الانضمام</label><input type="date" [(ngModel)]="form.joined" /></div>
      <div class="mf-group"><label>التقييم الابتدائي</label><input type="number" min="1" max="5" step="0.1" [(ngModel)]="form.rating" /></div>
    </div>
    <div class="mf-check"><label><input type="checkbox" [(ngModel)]="form.active" /> فعّال</label></div>
    <div class="mf-actions">
      <button class="btn-cancel-sm" type="button" (click)="showModal=false">إلغاء</button>
      <button class="btn-save-sm" type="button" (click)="save()">{{ isEditing ? 'حفظ التعديلات' : 'إضافة الفني' }}</button>
    </div>
  </div>
</app-modal>

<!-- Delete Confirm -->
<app-modal title="تأكيد الحذف" [visible]="showDeleteConfirm" (closed)="showDeleteConfirm=false">
  <p style="color:var(--text-muted);font-size:13.5px;text-align:center;margin:0 0 20px">هل أنت متأكد من حذف هذا الفني؟ لا يمكن التراجع عن هذا الإجراء.</p>
  <div class="mf-actions">
    <button class="btn-cancel-sm" (click)="showDeleteConfirm=false">إلغاء</button>
    <button class="btn-delete-sm" (click)="doDelete()">حذف</button>
  </div>
</app-modal>
