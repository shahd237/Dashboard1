<div class="page-card">
  <!-- Toolbar -->
  <div class="toolbar">
    <button class="btn-add" type="button" (click)="openAdd()">
      <svg viewBox="0 0 24 24" fill="none" width="15" height="15"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      إضافة هاتف
    </button>
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" width="15" height="15"><circle cx="11" cy="11" r="6.5" stroke="currentColor" stroke-width="1.8"/><path d="M20 20l-4.3-4.3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      <input type="text" [(ngModel)]="search" placeholder="البحث بالموديل أو الماركة..." />
    </div>
    <select class="filter-select" [(ngModel)]="filterBrand">
      <option *ngFor="let b of brands">{{ b }}</option>
    </select>
    <select class="filter-select" [(ngModel)]="filterStatus">
      <option>الكل</option><option>مفعل</option><option>غير مفعل</option>
    </select>
  </div>

  <!-- Table -->
  <div class="devices-table">
    <table>
      <thead><tr>
        <th></th><th>الجهاز</th><th>التخزين</th><th>اللون</th>
        <th>السعر</th><th>التقييم</th><th>الطلبات</th><th>الحالة</th><th>إجراءات</th>
      </tr></thead>
      <tbody>
        <tr *ngFor="let d of filtered">
          <td>
            <svg viewBox="0 0 36 60" fill="none" width="26" height="42" style="cursor:pointer" (click)="openDetail(d.id)">
              <rect x="2" y="2" width="32" height="56" rx="5" [attr.fill]="d.colorHex" fill-opacity="0.22" stroke="#aaa" stroke-width="1.5"/>
              <rect x="7" y="10" width="22" height="32" rx="2" fill="white" fill-opacity="0.55"/>
              <circle cx="18" cy="52" r="2.5" fill="#999"/>
            </svg>
          </td>
          <td class="device-name-cell">
            <span class="brand-label">{{ d.brand }}</span>
            <span>{{ d.model }}</span>
          </td>
          <td>{{ d.storage }}</td>
          <td><span class="color-dot" [style.background]="d.colorHex"></span> {{ d.color }}</td>
          <td><strong>{{ d.price | number }} ر.س</strong></td>
          <td><span class="rating-val"><svg viewBox="0 0 14 14" fill="#f0b429" width="12" height="12"><path d="M7 1l1.6 3.3 3.6.5-2.6 2.5.6 3.6L7 9.3l-3.2 1.6.6-3.6L1.8 4.8l3.6-.5L7 1Z"/></svg>{{ d.rating }}</span></td>
          <td>{{ d.orders }}</td>
          <td>
            <button class="toggle-btn" [class.is-on]="d.status === 'مفعل'" (click)="toggleStatus(d)"><span class="toggle-knob"></span></button>
          </td>
          <td class="actions">
            <button class="action-btn view-btn" title="التفاصيل" (click)="openDetail(d.id)">
              <svg viewBox="0 0 24 24" fill="none" width="13" height="13"><path d="M2.5 12S6 5.5 12 5.5 21.5 12 21.5 12 18 18.5 12 18.5 2.5 12 2.5 12Z" stroke="currentColor" stroke-width="1.6"/><circle cx="12" cy="12" r="2.5" stroke="currentColor" stroke-width="1.6"/></svg>
            </button>
            <button class="action-btn edit-btn" title="تعديل" (click)="openEdit(d)">
              <svg viewBox="0 0 24 24" fill="none" width="13" height="13"><path d="M16.5 4.5l3 3L8 19l-4 1 1-4 11.5-11.5Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>
            </button>
            <button class="action-btn delete-btn" title="حذف" (click)="confirmDelete(d.id)">
              <svg viewBox="0 0 24 24" fill="none" width="13" height="13"><path d="M5 7h14M9 7V5h6v2m-8 0 1 12h6l1-12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
          </td>
        </tr>
        <tr *ngIf="filtered.length === 0">
          <td colspan="9" class="empty-row">لا توجد أجهزة مطابقة للبحث</td>
        </tr>
      </tbody>
    </table>
  </div>
  <app-pagination [totalPages]="5"></app-pagination>
</div>

<!-- Add/Edit Modal -->
<app-modal [title]="isEditing ? 'تعديل بيانات الهاتف' : 'إضافة هاتف جديد'" [visible]="showModal" (closed)="showModal=false">
  <div class="modal-form">
    <div class="mf-row">
      <div class="mf-group"><label>الماركة</label>
        <select [(ngModel)]="form.brand">
          <option *ngFor="let b of brands.slice(1)">{{ b }}</option>
        </select>
      </div>
      <div class="mf-group"><label>الموديل</label><input [(ngModel)]="form.model" placeholder="iPhone 15 Pro" /></div>
    </div>
    <div class="mf-row">
      <div class="mf-group"><label>التخزين</label>
        <select [(ngModel)]="form.storage">
          <option *ngFor="let s of storageOptions">{{ s }}</option>
        </select>
      </div>
      <div class="mf-group"><label>السعر (ر.س)</label><input type="number" [(ngModel)]="form.price" placeholder="3999" /></div>
    </div>
    <div class="mf-row">
      <div class="mf-group"><label>اللون</label>
        <select [(ngModel)]="form.color" (ngModelChange)="form.colorHex = (colors.find(c=>c.name===form.color)?.hex ?? '#3a3a3c')">
          <option *ngFor="let c of colors" [value]="c.name">{{ c.name }}</option>
        </select>
      </div>
      <div class="mf-group"><label>التقييم</label><input type="number" min="1" max="5" step="0.1" [(ngModel)]="form.rating" /></div>
    </div>
    <div class="mf-group"><label>الحالة</label>
      <select [(ngModel)]="form.status">
        <option>مفعل</option><option>غير مفعل</option>
      </select>
    </div>
    <div class="mf-actions">
      <button class="btn-cancel-sm" (click)="showModal=false">إلغاء</button>
      <button class="btn-save-sm" (click)="save()">{{ isEditing ? 'حفظ التعديلات' : 'إضافة الهاتف' }}</button>
    </div>
  </div>
</app-modal>

<!-- Delete Confirm -->
<app-modal title="تأكيد الحذف" [visible]="showDeleteConfirm" (closed)="showDeleteConfirm=false">
  <p style="color:var(--text-muted);font-size:13.5px;text-align:center;margin:0 0 20px">هل أنت متأكد من حذف هذا الهاتف؟ لا يمكن التراجع عن هذا الإجراء.</p>
  <div class="mf-actions">
    <button class="btn-cancel-sm" (click)="showDeleteConfirm=false">إلغاء</button>
    <button class="btn-delete-sm" (click)="doDelete()">حذف</button>
  </div>
</app-modal>
