<div class="page-stats">
  <app-stat-card *ngFor="let s of stats" 
  [label]="s.label"
  [value]="s.value" 
  [sublabel]="s.sublabel" 
  [icon]="s.icon">
  </app-stat-card>
</div>

<div class="page-card">

  <!-- Toolbar -->
  <div class="toolbar">
    <!-- Left: Filter button -->
    <!-- Right: Search -->
    <div class="search-wrap">
      <input [(ngModel)]="search" placeholder="بحث برقم الهاتف او اسم الاسم او البريد الالكتروني" />
      <svg viewBox="0 0 24 24" fill="none" width="15" height="15">
        <circle cx="11" cy="11" r="6.5" stroke="currentColor" stroke-width="1.8"/>
        <path d="M20 20l-4.3-4.3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </div>

      <button class="btn-filter">
      <svg viewBox="0 0 24 24" fill="none" width="14" height="14">
        <path d="M3 6h18M7 12h10M11 18h2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      تصفية
    </button>
  </div>

  <!-- Table -->
  <div class="clients-table">
    <table>
      <thead>
        <tr>
          <th>الاسم</th>
          <th>رقم الهاتف</th>
          <th>البريد الالكتروني</th>
          <th>اجمالي الطلبات</th>
          <th>العنوان</th>
          <th>اجمالي الدفع</th>
          <th>تاريخ التسجيل</th>
          <th>الحالة</th>
          <th>الاجراءات</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let c of filtered">
          <td class="client-name-cell">
            <div class="avatar-circle">
              <img src="assets/image/f1326acd84b14d7fca1da878a3fa9ec7be74ee69.jpg">
            </div>
            <span class="client-name-text">{{ c.name }}</span>
          </td>
          <td>{{ c.phone }}</td>
          <td>{{ c.email }}</td>
          <td>{{ c.orders }}</td>
          <td>{{ c.address }}</td>
          <td>{{ c.totalPaid | number }}</td>
          <td>{{ c.joined }}</td>
          <td>
            <span class="status-badge" [ngClass]="c.status === 'مفعل' ? 'active' : 'inactive'">
              {{ c.status }}
            </span>
          </td>
          <td class="actions-cell">
            <button class="action-btn view-btn" (click)="openDetail(c.id)" title="عرض">
              <svg viewBox="0 0 24 24" fill="none" width="13" height="13">
                <path d="M2.5 12S6 5.5 12 5.5 21.5 12 21.5 12 18 18.5 12 18.5 2.5 12 2.5 12Z" stroke="currentColor" stroke-width="1.6"/>
                <circle cx="12" cy="12" r="2.5" stroke="currentColor" stroke-width="1.6"/>
              </svg>
            </button>
          </td>
        </tr>
        <tr *ngIf="filtered.length === 0">
          <td colspan="9" class="empty-row">لا توجد نتائج مطابقة</td>
        </tr>
      </tbody>
    </table>
  </div>

  <app-pagination [totalPages]="25"></app-pagination>
</div>

<!-- Delete Confirm Modal -->
<app-modal
  title="تأكيد الحذف"
  [visible]="showDeleteConfirm"
  (closed)="showDeleteConfirm = false">
  <p style="color:var(--text-muted);font-size:13.5px;text-align:center;margin:0 0 20px">
    هل أنت متأكد من حذف هذا العميل؟
  </p>
  <div class="mf-actions">
    <button class="btn-cancel-sm" (click)="showDeleteConfirm = false">إلغاء</button>
    <button class="btn-delete-sm" (click)="doDelete()">حذف</button>
  </div>
</app-modal>
