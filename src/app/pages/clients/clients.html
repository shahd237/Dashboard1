<div class="page-stats">
  <app-stat-card *ngFor="let s of stats" [value]="s.value" [label]="s.label" [sublabel]="s.sublabel" [icon]="s.icon"></app-stat-card>
</div>
<div class="page-card">
  <div class="toolbar">
    <button class="btn-add" (click)="openAdd()">
      <svg viewBox="0 0 24 24" fill="none" width="15" height="15"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>إضافة عميل
    </button>
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" width="15" height="15"><circle cx="11" cy="11" r="6.5" stroke="currentColor" stroke-width="1.8"/><path d="M20 20l-4.3-4.3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      <input [(ngModel)]="search" placeholder="البحث باسم العميل أو رقم الهاتف..." />
    </div>
  </div>
  <div class="clients-table">
    <table>
      <thead><tr><th>الاسم</th><th>رقم الهاتف</th><th>البريد الإلكتروني</th><th>عدد الطلبات</th><th>تاريخ التسجيل</th><th>الحالة</th><th>إجراءات</th></tr></thead>
      <tbody>
        <tr *ngFor="let c of filtered">
          <td class="client-name"><div class="avatar-circle">{{ c.name.charAt(0) }}</div>{{ c.name }}</td>
          <td>{{ c.phone }}</td><td>{{ c.email }}</td><td>{{ c.orders }}</td><td>{{ c.joined }}</td>
          <td><app-status-badge [label]="c.status" [tone]="c.status === 'مفعل' ? 'active' : 'inactive'"></app-status-badge></td>
          <td class="actions">
            <button class="action-btn view-btn" (click)="openDetail(c.id)"><svg viewBox="0 0 24 24" fill="none" width="13" height="13"><path d="M2.5 12S6 5.5 12 5.5 21.5 12 21.5 12 18 18.5 12 18.5 2.5 12 2.5 12Z" stroke="currentColor" stroke-width="1.6"/><circle cx="12" cy="12" r="2.5" stroke="currentColor" stroke-width="1.6"/></svg></button>
            <button class="action-btn edit-btn" (click)="openEdit(c)"><svg viewBox="0 0 24 24" fill="none" width="13" height="13"><path d="M16.5 4.5l3 3L8 19l-4 1 1-4 11.5-11.5Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg></button>
            <button class="action-btn delete-btn" (click)="confirmDelete(c.id)"><svg viewBox="0 0 24 24" fill="none" width="13" height="13"><path d="M5 7h14M9 7V5h6v2m-8 0 1 12h6l1-12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
          </td>
        </tr>
        <tr *ngIf="filtered.length === 0"><td colspan="7" class="empty-row">لا توجد نتائج مطابقة</td></tr>
      </tbody>
    </table>
  </div>
  <app-pagination [totalPages]="6"></app-pagination>
</div>

<app-modal [title]="isEditing ? 'تعديل بيانات العميل' : 'إضافة عميل جديد'" [visible]="showModal" (closed)="showModal=false">
  <div class="modal-form">
    <div class="mf-row">
      <div class="mf-group"><label>الاسم الكامل</label><input [(ngModel)]="form.name" placeholder="اسم العميل" /></div>
      <div class="mf-group"><label>رقم الهاتف</label><input [(ngModel)]="form.phone" placeholder="05XXXXXXXX" /></div>
    </div>
    <div class="mf-group"><label>البريد الإلكتروني</label><input type="email" [(ngModel)]="form.email" placeholder="email@example.com" /></div>
    <div class="mf-group"><label>الحالة</label>
      <select [(ngModel)]="form.status"><option>مفعل</option><option>غير مفعل</option></select>
    </div>
    <div class="mf-actions">
      <button class="btn-cancel-sm" (click)="showModal=false">إلغاء</button>
      <button class="btn-save-sm" (click)="save()">{{ isEditing ? 'حفظ التعديلات' : 'إضافة العميل' }}</button>
    </div>
  </div>
</app-modal>

<app-modal title="تأكيد الحذف" [visible]="showDeleteConfirm" (closed)="showDeleteConfirm=false">
  <p style="color:var(--text-muted);font-size:13.5px;text-align:center;margin:0 0 20px">هل أنت متأكد من حذف هذا العميل؟</p>
  <div class="mf-actions">
    <button class="btn-cancel-sm" (click)="showDeleteConfirm=false">إلغاء</button>
    <button class="btn-delete-sm" (click)="doDelete()">حذف</button>
  </div>
</app-modal>
