<div class="page-card">
  <div class="toolbar">
    <button class="btn-add" (click)="openAdd()">
      <svg viewBox="0 0 24 24" fill="none" width="15" height="15"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>إضافة طلب
    </button>
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" width="15" height="15"><circle cx="11" cy="11" r="6.5" stroke="currentColor" stroke-width="1.8"/><path d="M20 20l-4.3-4.3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      <input [(ngModel)]="search" placeholder="بحث برقم الطلب، العميل، أو الجهاز..." />
    </div>
    <select class="filter-select" [(ngModel)]="filterStatus">
      <option>الكل</option>
      <option *ngFor="let s of statuses">{{ s }}</option>
    </select>
  </div>

  <div class="mr-table">
    <table>
      <thead><tr>
        <th>رقم الطلب</th><th>العميل</th><th>الجهاز</th>
        <th>الفني المكلف</th><th>تاريخ الطلب</th><th>التكلفة</th>
        <th>الحالة</th><th>إجراءات</th>
      </tr></thead>
      <tbody>
        <tr *ngFor="let row of filtered">
          <td>#{{ row.id }}</td>
          <td>{{ row.client }}</td><td>{{ row.device }}</td>
          <td>{{ row.technician }}</td><td>{{ row.date }}</td><td>{{ row.price }}</td>
          <td><app-status-badge [label]="row.status" [tone]="badgeTone(row.status)"></app-status-badge></td>
          <td class="row-actions">
            <a [routerLink]="['/maintenance-requests', row.id, 'assign']" class="action-btn assign-btn" title="تكليف فني">
              <svg viewBox="0 0 24 24" fill="none" width="13" height="13"><path d="M9 12l2 2 4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.6"/></svg>
            </a>
            <a [routerLink]="['/maintenance-requests', row.id, 'track']" class="action-btn track-btn" title="تتبع الفني">
              <svg viewBox="0 0 24 24" fill="none" width="13" height="13"><path d="M12 13.5a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" stroke="currentColor" stroke-width="1.5"/><path d="M12 2C8.1 2 5 5.1 5 9c0 5.3 7 13 7 13s7-7.7 7-13c0-3.9-3.1-7-7-7Z" stroke="currentColor" stroke-width="1.5"/></svg>
            </a>
            <button class="action-btn edit-btn" (click)="openEdit(row)">
              <svg viewBox="0 0 24 24" fill="none" width="13" height="13"><path d="M16.5 4.5l3 3L8 19l-4 1 1-4 11.5-11.5Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>
            </button>
            <button class="action-btn delete-btn" (click)="confirmDelete(row.id)">
              <svg viewBox="0 0 24 24" fill="none" width="13" height="13"><path d="M5 7h14M9 7V5h6v2m-8 0 1 12h6l1-12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
          </td>
        </tr>
        <tr *ngIf="filtered.length === 0"><td colspan="8" class="empty-row">لا توجد طلبات مطابقة</td></tr>
      </tbody>
    </table>
  </div>
  <app-pagination [totalPages]="6"></app-pagination>
</div>

<app-modal [title]="isEditing ? 'تعديل الطلب' : 'إضافة طلب جديد'" [visible]="showModal" (closed)="showModal=false">
  <div class="modal-form">
    <div class="mf-row">
      <div class="mf-group"><label>اسم العميل</label><input [(ngModel)]="form.client" placeholder="اسم العميل" /></div>
      <div class="mf-group"><label>الجهاز</label><input [(ngModel)]="form.device" placeholder="iPhone 15 Pro" /></div>
    </div>
    <div class="mf-row">
      <div class="mf-group"><label>الفني المكلف</label>
        <select [(ngModel)]="form.technician">
          <option *ngFor="let t of technicians">{{ t }}</option>
        </select>
      </div>
      <div class="mf-group"><label>التكلفة</label><input [(ngModel)]="form.price" placeholder="350 ر.س" /></div>
    </div>
    <div class="mf-group"><label>الحالة</label>
      <select [(ngModel)]="form.status">
        <option *ngFor="let s of statuses">{{ s }}</option>
      </select>
    </div>
    <div class="mf-actions">
      <button class="btn-cancel-sm" (click)="showModal=false">إلغاء</button>
      <button class="btn-save-sm" (click)="save()">{{ isEditing ? 'حفظ التعديلات' : 'إضافة الطلب' }}</button>
    </div>
  </div>
</app-modal>

<app-modal title="تأكيد الحذف" [visible]="showDeleteConfirm" (closed)="showDeleteConfirm=false">
  <p style="color:var(--text-muted);font-size:13.5px;text-align:center;margin:0 0 20px">هل أنت متأكد من حذف هذا الطلب؟</p>
  <div class="mf-actions">
    <button class="btn-cancel-sm" (click)="showDeleteConfirm=false">إلغاء</button>
    <button class="btn-delete-sm" (click)="doDelete()">حذف</button>
  </div>
</app-modal>
