<div class="page-card">
  <div class="toolbar">
   <div class="search-filter-bar">
  <div class="search-filter-container">
    
    <!-- Search Input -->
    <div class="search-input-wrapper">
       <svg viewBox="0 0 24 24" fill="none" width="15" height="10"><circle cx="11" cy="11" r="6.5" stroke="currentColor" stroke-width="1./"/><path d="M20 20l-4.3-4.3" stroke="currentColor" stroke-width="2.8" stroke-linecap="round"/></svg>
      <input 
        type="text" 
        class="search-input" 
        placeholder="ابحث برقم الطلب باسم العميل أو رقم الجوال"
        [(ngModel)]="searchQuery"
        (input)="onSearch()">
      <button class="search-button" (click)="onSearch()">
      </button>
    </div>

    <!-- Date Range Filters -->
    <div class="filter-group">
      <!-- From Date -->
      <div class="date-filter-wrapper">
        <label for="from-date" class="date-label">من تاريخ</label>
        <input 
          type="date" 
          id="from-date"
          class="date-input"
          [(ngModel)]="fromDate"
          (change)="onDateChange()">
      </div>

      <!-- To Date -->
      <div class="date-filter-wrapper">
        <label for="to-date" class="date-label">إلى تاريخ</label>
        <input 
          type="date" 
          id="to-date"
          class="date-input"
          [(ngModel)]="toDate"
          (change)="onDateChange()">
      </div>
    </div>

    <!-- Dropdown Filters -->
    <div class="dropdown-group">
      <!-- Categories Dropdown -->
      <div class="dropdown-wrapper">
        <span class="dropdown-arrow">▼</span>
        <select class="dropdown-select" [(ngModel)]="selectedCategory" (change)="onCategoryChange()">
          <option value="">جميع الفئات</option>
          <option value="electronics">الإلكترونيات</option>
          <option value="clothing">الملابس</option>
          <option value="food">الأغذية</option>
          <option value="books">الكتب</option>
        </select>
        
      </div>

      <!-- Status Dropdown -->
      <div class="dropdown-wrapper">
        <span class="dropdown-arrow">▼</span>
        <select class="dropdown-select" [(ngModel)]="selectedStatus" (change)="onStatusChange()">
          <option value="">جميع الحالات</option>
          <option value="pending">قيد الانتظار</option>
          <option value="processing">قيد المعالجة</option>
          <option value="completed">مكتمل</option>
          <option value="cancelled">ملغي</option>
        </select>
        
      </div>
    </div>

  </div>
</div>
  </div>

  </div>
  <app-pagination [totalPages]="6"></app-pagination>
</div>

<app-modal title="تأكيد الحذف" [visible]="showDeleteConfirm" (closed)="showDeleteConfirm=false">
  <p style="color:var(--text-muted);font-size:13.5px;text-align:center;margin:0 0 20px">هل أنت متأكد من حذف هذا الطلب؟</p>
  <div class="mf-actions">
    <button class="btn-cancel-sm" (click)="showDeleteConfirm=false">إلغاء</button>
    <button class="btn-delete-sm" (click)="doDelete()">حذف</button>
  </div>
</app-modal>
