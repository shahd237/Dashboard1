<div class="sub-page">

  <!-- Filter Bar -->
  <div class="filter-bar">
    <div class="filter-search">
      <svg viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="6.5" stroke="currentColor" stroke-width="1.8"/><path d="M20 20l-4.3-4.3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      <input type="text" [(ngModel)]="searchTerm" placeholder="ابحث باسم المستخدم أو رقم العملية" />
    </div>
    <div class="filter-date">
      <svg viewBox="0 0 24 24" fill="none" width="14" height="14"><rect x="3" y="4" width="18" height="17" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M3 9h18M8 2v4M16 2v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      <input type="date" [(ngModel)]="fromDate" />
    </div>
    <div class="filter-date">
      <svg viewBox="0 0 24 24" fill="none" width="14" height="14"><rect x="3" y="4" width="18" height="17" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M3 9h18M8 2v4M16 2v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      <input type="date" [(ngModel)]="toDate" />
    </div>
    <div class="filter-select">
      <select [(ngModel)]="paymentFilter">
        <option *ngFor="let p of paymentMethods">{{ p }}</option>
      </select>
      <svg viewBox="0 0 24 24" fill="none" width="12" height="12"><path d="M7 10l5 5 5-5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
    </div>
    <div class="filter-select">
      <select [(ngModel)]="filterStatus">
        <option value="all">جميع الحالات</option>
        <option value="مقبول">مقبول</option>
        <option value="بانتظار المراجعة">بانتظار المراجعة</option>
        <option value="مرفوض">مرفوض</option>
      </select>
      <svg viewBox="0 0 24 24" fill="none" width="12" height="12"><path d="M7 10l5 5 5-5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
    </div>
  </div>

  <!-- Stat Cards -->
  <div class="stat-cards">
    <div class="stat-card" *ngFor="let s of stats" [class]="'stat-card--' + s.color" (click)="setFilter(s.filter)">
      <span class="stat-card__label">{{ s.label }}</span>
      <span class="stat-card__value" [class]="'val--' + s.color">{{ s.value }}</span>
      <span class="stat-card__link">عرض الكل</span>
    </div>
  </div>

  <!-- Table -->
  <div class="sub-table-wrap">
    <table class="sub-table">
      <thead>
        <tr>
          <th>رقم العملية</th>
          <th>اسم المستخدم</th>
          <th>رقم الهاتف</th>
          <th>طريقة الدفع</th>
          <th>صورة الوصل</th>
          <th>تاريخ الطلب</th>
          <th>الحالة</th>
          <th>الإجراءات</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let row of filtered">
          <td class="txn-id">{{ row.txnId }}</td>
          <td>{{ row.userName }}</td>
          <td>{{ row.phone }}</td>
          <td>{{ row.paymentMethod }}</td>
          <td>
            <div class="receipt-thumb">
              <svg viewBox="0 0 48 60" fill="none" width="38" height="48">
                <rect width="48" height="60" rx="3" fill="#f0ede8"/>
                <rect x="4" y="4" width="40" height="52" rx="2" fill="#fff"/>
                <text x="24" y="20" text-anchor="middle" font-size="6" font-weight="bold" fill="#222">fawry فوري</text>
                <line x1="6" y1="24" x2="42" y2="24" stroke="#ddd" stroke-width="0.8"/>
                <text x="24" y="32" text-anchor="middle" font-size="4.5" fill="#888">EGP 3000.00</text>
                <text x="24" y="39" text-anchor="middle" font-size="4" fill="#aaa">3836656611</text>
                <line x1="6" y1="44" x2="42" y2="44" stroke="#eee" stroke-width="0.5" stroke-dasharray="3"/>
              </svg>
            </div>
          </td>
          <td>
            <span class="date-cell">{{ row.date }}</span>
            <span class="time-cell">{{ row.time }}</span>
          </td>
          <td><span class="status-pill" [class]="statusClass(row.status)">{{ row.status }}</span></td>
          <td>
            <button class="view-btn" type="button" (click)="openDetail(row)" title="عرض التفاصيل">
              <svg viewBox="0 0 24 24" fill="none" width="16" height="16">
                <path d="M2.5 12S6 5.5 12 5.5 21.5 12 21.5 12 18 18.5 12 18.5 2.5 12 2.5 12Z" stroke="currentColor" stroke-width="1.6"/>
                <circle cx="12" cy="12" r="2.5" stroke="currentColor" stroke-width="1.6"/>
              </svg>
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <app-pagination [totalPages]="6" [currentPage]="1"></app-pagination>
</div>
