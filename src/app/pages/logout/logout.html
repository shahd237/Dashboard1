<div class="logout-screen">
  <div class="logout-card page-card">
    <div class="logout-icon">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M15 16.5 19.5 12 15 7.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M19.5 12H9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <path d="M11.5 4.5H6A1.5 1.5 0 0 0 4.5 6v12A1.5 1.5 0 0 0 6 19.5h5.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <h2>تأكيد تسجيل الخروج</h2>
    <p>هل أنت متأكد من رغبتك في تسجيل الخروج من النظام؟</p>
    <div class="logout-actions">
      <button class="btn-logout" type="button" (click)="confirm()">نعم، تسجيل الخروج</button>
      <button class="btn-cancel" type="button" (click)="cancel()">إلغاء</button>
    </div>
  </div>
</div>
